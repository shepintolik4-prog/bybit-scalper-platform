server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # В docker-compose backend может пересоздаваться и менять IP.
        # Nginx резолвит hostname один раз при старте, поэтому добавляем docker DNS resolver
        # и proxy_pass через переменную, чтобы имя пересчитывалось.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
